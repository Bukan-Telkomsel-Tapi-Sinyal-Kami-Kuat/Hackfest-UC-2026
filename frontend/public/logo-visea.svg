<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" fill="#2563EB"/>

  <!-- Eye outline glow -->
  <ellipse cx="256" cy="210" rx="155" ry="86" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.25"/>

  <!-- Outer sclera -->
  <ellipse cx="256" cy="210" rx="148" ry="80" fill="white" fill-opacity="0.96"/>

  <!-- Iris ring -->
  <circle cx="256" cy="210" r="56" fill="#1D4ED8"/>

  <!-- Pupil white core -->
  <circle cx="256" cy="210" r="24" fill="white"/>

  <!-- Center dot -->
  <circle cx="256" cy="210" r="9" fill="#1E40AF"/>

  <!-- Neural dot: top-left -->
  <circle cx="130" cy="155" r="9" fill="white" fill-opacity="0.55"/>
  <!-- Neural dot: top-right -->
  <circle cx="382" cy="155" r="9" fill="white" fill-opacity="0.55"/>
  <!-- Neural dot: left -->
  <circle cx="98" cy="212" r="7" fill="white" fill-opacity="0.38"/>
  <!-- Neural dot: right -->
  <circle cx="414" cy="212" r="7" fill="white" fill-opacity="0.38"/>
  <!-- Neural dot: bottom-left -->
  <circle cx="148" cy="268" r="6" fill="white" fill-opacity="0.3"/>
  <!-- Neural dot: bottom-right -->
  <circle cx="364" cy="268" r="6" fill="white" fill-opacity="0.3"/>

  <!-- Connection lines -->
  <line x1="139" y1="159" x2="200" y2="190" stroke="white" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="373" y1="159" x2="312" y2="190" stroke="white" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="105" y1="212" x2="160" y2="210" stroke="white" stroke-width="1.5" stroke-opacity="0.22"/>
  <line x1="407" y1="212" x2="352" y2="210" stroke="white" stroke-width="1.5" stroke-opacity="0.22"/>

  <!-- VISEA wordmark -->
  <text x="256" y="370" font-family="Arial, Helvetica, sans-serif" font-size="76" font-weight="900" fill="white" text-anchor="middle" letter-spacing="10">VISEA</text>

  <!-- Tagline -->
  <text x="256" y="408" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="white" fill-opacity="0.65" text-anchor="middle" letter-spacing="4">VISION · LEARN · GROW</text>
</svg>
